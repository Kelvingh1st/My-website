<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store Admin Portal</title>
    <style>
        /* UI Palette */
        :root {
            --bg-deep: #0B0E11;
            --bg-card: #141A21;
            --text-main: #FFFFFF;
            --text-muted: #788694;
            --neon-teal: #00E5FF;
            --neon-orange: #FF9100;
            --neon-purple: #B388FF;
            --neon-red: #FF3D00;
            --neon-green: #00E676;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            padding-bottom: 40px;
        }

        /* Login Screen Overlay */
        .login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .login-card {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .login-card h2 { color: var(--neon-teal); margin-top: 0; }
        .login-card p { color: var(--text-muted); font-size: 14px; margin-bottom: 25px;}

        h3 {
            margin-top: 0;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        /* Inputs configuration styling */
        .input-container { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 13px; }
        
        input[type="text"], input[type="number"], input[type="password"] {
            width: 100%;
            padding: 14px;
            background-color: #1B232D;
            border: 1px solid #25313F;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            font-size: 15px;
            outline: none;
        }
        input:focus { border-color: var(--neon-teal); }

        input[type="file"] {
            width: 100%;
            padding: 20px;
            background-color: #1B232D;
            border: 2px dashed #25313F;
            border-radius: 10px;
            color: var(--text-muted);
            text-align: center;
            box-sizing: border-box;
        }

        /* Premium Buttons */
        .action-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }
        .action-btn:active { opacity: 0.8; }
        .teal-btn { background-color: var(--neon-teal); color: #000; }
        .orange-btn { background-color: var(--neon-orange); color: #000; }

        /* Rings Structure CSS Layout */
        .activity-container {
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 10px 0;
        }
        .ring-chart {
            position: relative;
            width: 120px;
            height: 120px;
        }
        .ring-chart svg { transform: rotate(-90deg); }
        
        .legend-list { display: flex; flex-direction: column; gap: 12px; }
        .legend-item { font-size: 14px; color: var(--text-main); display: flex; align-items: center; gap: 8px;}
        .legend-item small { color: var(--text-muted); display: block;}
        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .teal-dot { background-color: var(--neon-teal); }
        .orange-dot { background-color: var(--neon-orange); }
        .red-dot { background-color: var(--neon-red); }

        /* Main System Grid View */
        #mainPanel { display: none; max-width: 500px; margin: 0 auto; position: relative; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;}
        .status-badge { background-color: rgba(0,229,255,0.1); color: var(--neon-teal); padding: 6px 12px; border-radius: 20px; font-size: 12px; white-space: nowrap;}

        /* Inventory Cards */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px;}
        .admin-card { background-color: var(--bg-card); border-radius: 12px; padding: 12px; display: flex; flex-direction: column;}
        .admin-card img { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; }
        .admin-card-info { padding-top: 8px; }
        .title-text { font-size: 14px; font-weight: bold; margin: 0;}
        .stock-text { font-size: 12px; color: var(--neon-purple); margin: 4px 0;}
        .price-text { color: var(--neon-orange); font-weight: bold; font-size: 15px; margin: 4px 0;}
        .delete-btn { background-color: rgba(255,61,0,0.1); color: var(--neon-red); border: none; padding: 8px; border-radius: 20px; width: 100%; margin-top: 8px; font-weight: bold; cursor: pointer;}
        
        /* Incoming Orders Display Elements */
        .order-row { background: #1B232D; border: 1px solid #25313F; border-radius: 12px; padding: 12px; margin-bottom: 10px; }
        .order-meta { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }

        /* Low Stock Bell Badge & Dropdown Style Components */
        .notification-wrapper {
            position: relative;
            display: inline-block;
        }
        .notification-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-right: 8px;
            padding: 4px;
        }
        .bell-icon {
            font-size: 20px;
            color: var(--text-muted);
            transition: color 0.2s;
        }
        .bell-icon.alert-active {
            color: var(--neon-orange);
        }
        .bell-badge {
            position: absolute;
            top: -4px;
            right: 0px;
            background-color: var(--neon-red);
            color: #FFFFFF;
            font-size: 10px;
            font-weight: bold;
            border-radius: 50%;
            min-width: 15px;
            height: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px;
            box-sizing: border-box;
            box-shadow: 0 0 8px var(--neon-red);
        }
        .notif-dropdown {
            position: absolute;
            top: 34px;
            right: 4px;
            width: 260px;
            background-color: #1B232D;
            border: 1px solid #25313F;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            display: none;
            z-index: 1000;
            overflow: hidden;
        }
        .notif-header {
            padding: 10px 14px;
            border-bottom: 1px solid #25313F;
            font-size: 12px;
            font-weight: bold;
            color: var(--text-muted);
            background-color: rgba(255, 61, 0, 0.05);
        }
        .notif-item {
            padding: 12px 14px;
            border-bottom: 1px solid #212C38;
            font-size: 13px;
            color: var(--text-main);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .notif-item:last-child { border-bottom: none; }
        .notif-item span { font-weight: bold; color: var(--neon-red); }
        .notif-empty {
            padding: 16px;
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <div id="loginGate" class="login-screen">
        <div class="glass-card login-card">
            <h2>Administrative Portal</h2>
            <p>Enter administrative profile credentials</p>
            <div class="input-container">
                <input type="text" id="loginUser" placeholder="Username">
            </div>
            <div class="input-container">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button id="loginBtn" class="action-btn teal-btn">Sign In to Dashboard</button>
        </div>
    </div>

    <div id="mainPanel">
        <div class="header-bar">
            <div>
                <h2 style="margin:0; font-size:24px;">Administrative Seller Portal</h2>
                <span style="color:var(--text-muted); font-size:13px;">Goods Management</span>
            </div>
            <div style="display: flex; align-items: center;">
                <div class="notification-wrapper">
                    <div class="notification-container" id="lowStockBellWrapper" onclick="toggleNotifDropdown()" title="Low Stock Warning Alert">
                        <span class="bell-icon" id="bellIcon">🔔</span>
                        <div class="bell-badge" id="bellBadge" style="display: none;">0</div>
                    </div>
                    <div class="notif-dropdown" id="notificationDropdown">
                        <div class="notif-header">CRITICAL STOCK ALERTS</div>
                        <div id="notifItemsContainer"></div>
                    </div>
                </div>
                <div class="status-badge">● Online</div>
            </div>
        </div>

        <div class="glass-card">
            <h3>Live Traffic Analytics</h3>
            <div class="activity-container">
                <div class="ring-chart">
                    <svg width="120" height="120" viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="50" stroke="#17222B" stroke-width="6" fill="none"/>
                        <circle cx="60" cy="60" r="50" stroke="var(--neon-teal)" stroke-width="6" fill="none" stroke-dasharray="314" stroke-dashoffset="314"/>
                        
                        <circle cx="60" cy="60" r="38" stroke="#24211D" stroke-width="6" fill="none"/>
                        <circle cx="60" cy="60" r="38" stroke="var(--neon-orange)" stroke-width="6" fill="none" stroke-dasharray="238" stroke-dashoffset="238"/>
                        
                        <circle cx="60" cy="60" r="26" stroke="#241619" stroke-width="6" fill="none"/>
                        <circle cx="60" cy="60" r="26" stroke="var(--neon-red)" stroke-width="6" fill="none" stroke-dasharray="163" stroke-dashoffset="163"/>
                    </svg>
                </div>
                <div class="legend-list">
                    <div class="legend-item"><span class="dot teal-dot"></span> Views <small>0</small></div>
                    <div class="legend-item"><span class="dot orange-dot"></span> Orders <small>0</small></div>
                    <div class="legend-item"><span class="dot red-dot"></span> Saves <small>0</small></div>
                </div>
            </div>
        </div>

        <div class="glass-card">
            <h3 style="color: var(--neon-teal); margin-bottom:15px;">📦 Incoming Logistics Orders</h3>
            <div id="adminOrdersLog"></div>
        </div>

        <div class="glass-card">
            <h3>Publish New Cargo</h3>
            
            <div class="input-container">
                <label>Product Title</label>
                <input type="text" id="prodName" placeholder="e.g., Jordan 3">
            </div>

            <div class="input-container" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>Price ($)</label>
                    <input type="number" id="prodPrice" placeholder="99.00">
                </div>
                <div style="flex: 1;">
                    <label>In Stock (Qty)</label>
                    <input type="number" id="prodQty" placeholder="15">
                </div>
            </div>

            <div class="input-container">
                <label>Media Capture</label>
                <input type="file" id="prodFile" accept="image/*">
            </div>

            <button class="action-btn orange-btn" id="addBtn">Push Stock Live</button>
        </div>

        <div>
            <h3 style="margin-left: 5px;">Active Items on Display</h3>
            <div class="admin-grid" id="adminGrid"></div>
        </div>
    </div>

    <script>
        // 1. GATEWAY LOGIN CONTROLLER
        document.getElementById('loginBtn').addEventListener('click', () => {
            const user = document.getElementById('loginUser').value;
            const pass = document.getElementById('loginPass').value;

            if(user === 'admin' && pass === 'admin') {
                document.getElementById('loginGate').style.display = 'none';
                document.getElementById('mainPanel').style.display = 'block';
                renderAdminInventory();
                renderAdminOrders();
                updateTrafficAnalytics(); 
            } else {
                alert('Access Denied. Identity mismatch.');
            }
        });

        // NOTIFICATION DROPDOWN TOGGLE ENGINE
        window.toggleNotifDropdown = function() {
            const dropdown = document.getElementById('notificationDropdown');
            dropdown.style.display = dropdown.style.display === 'block' ? 'none' : 'block';
        };

        document.addEventListener('click', (e) => {
            const wrapper = document.querySelector('.notification-wrapper');
            const dropdown = document.getElementById('notificationDropdown');
            if (wrapper && !wrapper.contains(e.target) && dropdown) {
                dropdown.style.display = 'none';
            }
        });

        // 2. STOCK COMPILATION MANAGEMENT
        const prodNameInput = document.getElementById('prodName');
        const prodPriceInput = document.getElementById('prodPrice');
        const prodQtyInput = document.getElementById('prodQty');
        const prodFileInput = document.getElementById('prodFile');
        const adminGrid = document.getElementById('adminGrid');
        const adminOrdersLog = document.getElementById('adminOrdersLog');

        function renderAdminInventory() {
            if (!adminGrid) return;
            adminGrid.innerHTML = '';
            let currentProducts = JSON.parse(localStorage.getItem('storeInventory')) || [];
            
            if (currentProducts.length === 0) {
                adminGrid.innerHTML = '<p style="color:var(--text-muted); padding-left:5px;">Warehouse grid clear.</p>';
                return;
            }

            currentProducts.forEach((product, index) => {
                const card = document.createElement('div');
                card.className = 'admin-card';
                card.innerHTML = `
                    <img src="${product.imgUrl || ''}">
                    <div class="admin-card-info">
                        <p class="title-text">${product.title || product.name || 'Unnamed Product'}</p>
                        <p class="stock-text">Qty Available: ${product.quantity ?? 0} | ❤️ ${product.likes || 0}</p>
                        <p class="price-text">$${product.price || '0.00'}</p>
                        <button class="delete-btn" onclick="deleteItem(${index})">Delete</button>
                    </div>
                `;
                adminGrid.appendChild(card);
            });
        }

        window.deleteItem = function(index) {
            let currentProducts = JSON.parse(localStorage.getItem('storeInventory')) || [];
            currentProducts.splice(index, 1);
            localStorage.setItem('storeInventory', JSON.stringify(currentProducts));
            renderAdminInventory();
            updateTrafficAnalytics();
        };

        document.getElementById('addBtn').addEventListener('click', () => {
            const name = prodNameInput.value;
            const price = prodPriceInput.value;
            const qty = prodQtyInput.value;
            const file = prodFileInput.files[0];

            if (!name || !price || !qty || !file) {
                alert('Fill completely before data processing!');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(event) {
                let currentProducts = JSON.parse(localStorage.getItem('storeInventory')) || [];
                
                currentProducts.push({
                    title: name,
                    price: parseFloat(price).toFixed(2),
                    quantity: parseInt(qty),
                    likes: 0,
                    imgUrl: event.target.result
                });

                localStorage.setItem('storeInventory', JSON.stringify(currentProducts));
                
                prodNameInput.value = '';
                prodPriceInput.value = '';
                prodQtyInput.value = '';
                prodFileInput.value = '';
                
                renderAdminInventory();
                updateTrafficAnalytics(); 
            };
            reader.readAsDataURL(file);
        });

        // 3. ADMINISTRATIVE DISPATCH LOGISTICS CONTROLLER
        function renderAdminOrders() {
            if (!adminOrdersLog) return;
            adminOrdersLog.innerHTML = '';
            let orders = JSON.parse(localStorage.getItem('storeOrders')) || [];

            if (orders.length === 0) {
                adminOrdersLog.innerHTML = '<p style="color:var(--text-muted); margin:0; font-size:14px;">No client delivery packets received yet.</p>';
                return;
            }

            orders.slice().reverse().forEach((order, reverseIndex) => {
                const actualIndex = orders.length - 1 - reverseIndex;
                const row = document.createElement('div');
                row.className = 'order-row';
                
                row.innerHTML = `
                    <div class="order-meta">ID: ${order.id || 'N/A'} | Paid via: <strong>${order.payMethod || 'Unknown'}</strong></div>
                    <div style="font-size: 15px; font-weight: bold; color: var(--neon-orange);">
                        ${order.qty || 1}x ${order.itemTitle || 'Item'} (${order.color || 'Default'}) - $${(order.price || 0) * (order.qty || 1)}
                    </div>
                    <div style="font-size: 13px; margin-top: 4px;">
                        <span>To: <strong>${order.name || 'Guest'}</strong></span><br>
                        <span style="color: var(--text-muted);">Destination: ${order.addr || 'No Address'}</span>
                    </div>
                    <div class="order-flex" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <span style="font-size: 13px; color: var(--text-muted);">Delivery Status:</span>
                        <div class="status-select-wrap">
                            <select onchange="updateFulfillmentProgress(${actualIndex}, this.value)" style="color: var(--neon-green); padding: 8px; background:#1B232D; border:1px solid #25313F; border-radius:6px;">
                                <option value="Pending" ${order.status === 'Pending' ? 'selected' : ''}>Pending</option>
                                <option value="Processing" ${order.status === 'Processing' ? 'selected' : ''}>Processing</option>
                                <option value="In Transit" ${order.status === 'In Transit' ? 'selected' : ''}>In Transit</option>
                                <option value="Delivered" ${order.status === 'Delivered' ? 'selected' : ''}>Delivered</option>
                            </select>
                        </div>
                    </div>
                `;
                adminOrdersLog.appendChild(row);
            });
        }

        window.updateFulfillmentProgress = function(index, newStatus) {
            let orders = JSON.parse(localStorage.getItem('storeOrders')) || [];
            if(orders[index]) {
                orders[index].status = newStatus;
                localStorage.setItem('storeOrders', JSON.stringify(orders));
                renderAdminOrders();
                updateTrafficAnalytics(); 
            }
        };

        // 4. REAL-TIME TRAFFIC ANALYTICS CONTROLLER
        function updateTrafficAnalytics() {
            let inventory = JSON.parse(localStorage.getItem('storeInventory')) || [];
            let orders = JSON.parse(localStorage.getItem('storeOrders')) || [];

            const totalViewsCount = parseInt(localStorage.getItem('customerVisits')) || 0;
            const totalOrdersCount = orders.length;
            let totalSavesCount = inventory.reduce((sum, item) => sum + (parseInt(item.likes) || 0), 0);

            // PROCESS LOW QUANTITY NOTIFICATIONS (< 10 UNITS)
            const lowStockItems = inventory.filter(item => (parseInt(item.quantity) || 0) < 10);
            const bellBadge = document.getElementById('bellBadge');
            const bellIcon = document.getElementById('bellIcon');
            const notifItemsContainer = document.getElementById('notifItemsContainer');
            
            if (lowStockItems.length > 0) {
                bellBadge.innerText = lowStockItems.length;
                bellBadge.style.display = 'flex';
                bellIcon.classList.add('alert-active');
                
                notifItemsContainer.innerHTML = '';
                lowStockItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'notif-item';
                    div.innerHTML = `${item.title || 'Product'} <span>Low Qty: ${item.quantity ?? 0}</span>`;
                    notifItemsContainer.appendChild(div);
                });
            } else {
                bellBadge.style.display = 'none';
                bellIcon.classList.remove('alert-active');
                notifItemsContainer.innerHTML = '<div class="notif-empty">All stock metrics fully optimized.</div>';
            }

            const legendItems = document.querySelectorAll('.legend-item small');
            if (legendItems.length >= 3) {
                legendItems[0].innerText = totalViewsCount.toLocaleString();
                legendItems[1].innerText = totalOrdersCount.toLocaleString();
                legendItems[2].innerText = totalSavesCount.toLocaleString();
            }

            // Dynamic SVG Stroke Math
            const viewsProgress = totalViewsCount > 0 ? Math.min(100, (totalViewsCount / 100) * 100) : 0;
            const tealOffset = 314 - (314 * viewsProgress) / 100;

            const ordersProgress = totalOrdersCount > 0 ? Math.min(100, (totalOrdersCount / 20) * 100) : 0;
            const orangeOffset = 238 - (238 * ordersProgress) / 100;

            const savesProgress = totalSavesCount > 0 ? Math.min(100, (totalSavesCount / 50) * 100) : 0;
            const redOffset = 163 - (163 * savesProgress) / 100;

            const circles = document.querySelectorAll('.ring-chart svg circle');
            if (circles.length >= 6) {
                circles[1].style.strokeDashoffset = tealOffset; 
                circles[3].style.strokeDashoffset = orangeOffset;
                circles[5].style.strokeDashoffset = redOffset;
            }
        }

        // 3-second cycle polling loop
        setInterval(() => {
            if (document.getElementById('mainPanel').style.display === 'block') {
                renderAdminOrders();
                renderAdminInventory(); 
                updateTrafficAnalytics();
            }
        }, 3000);
    </script>
</body>
</html>
